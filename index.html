<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intercambios Escolares — La Casa del Profe</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --verde: #6F9C10; --verde-dark: #4a6b0a; --verde-light: #e8f4d0;
  --marron: #403B38; --beige: #f5f1eb;
  --bleu: #3a7bc8; --violet: #8b5cf6; --rouge: #e05c3a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: Georgia, serif; background: var(--beige); color: var(--marron); }
body { display: flex; flex-direction: column; }

/* HEADER */
.header { background: var(--marron); color: white; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 1.25em; }
.header h1 span { color: var(--verde); }
.badge { background: var(--verde); color: white; padding: 4px 13px; border-radius: 20px; font-size: 0.83em; font-family: sans-serif; }

/* FILTRES */
.filters { background: white; padding: 9px 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; border-bottom: 2px solid var(--verde-light); }
.filters input, .filters select { padding: 6px 10px; border: 1.5px solid #ddd; border-radius: 7px; font-size: 0.88em; background: var(--beige); color: var(--marron); outline: none; font-family: sans-serif; }
.filters input { flex: 1 1 170px; }
.filters input:focus, .filters select:focus { border-color: var(--verde); }
.btn-reset { padding: 6px 12px; background: var(--marron); color: white; border: none; border-radius: 7px; cursor: pointer; font-size: 0.85em; font-family: sans-serif; }
.btn-reset:hover { background: var(--verde-dark); }

/* LÉGENDE */
.legend { background: white; padding: 6px 16px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; border-bottom: 1px solid #eee; font-size: 0.8em; font-family: sans-serif; }
.leg { display: flex; align-items: center; gap: 5px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }

/* LAYOUT */
.layout { display: flex; flex: 1; min-height: 0; }
.sidebar { width: 300px; min-width: 220px; background: white; overflow-y: auto; border-right: 1px solid #eee; }
.sidebar-head { padding: 9px 13px; background: var(--verde-light); border-bottom: 1px solid #c8e09a; font-size: 0.85em; font-weight: bold; color: var(--verde-dark); font-family: sans-serif; position: sticky; top: 0; z-index: 5; }
.card { padding: 11px 13px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.15s; }
.card:hover { background: var(--beige); }
.card.active { background: var(--verde-light); border-left: 3px solid var(--verde); }
.card-etab { font-weight: bold; font-size: 0.9em; margin-bottom: 2px; }
.card-ville { font-size: 0.8em; color: #888; margin-bottom: 5px; font-family: sans-serif; }
.tag { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 0.72em; font-weight: bold; color: white; font-family: sans-serif; }
.empty { padding: 25px 14px; text-align: center; color: #aaa; font-size: 0.88em; font-family: sans-serif; }
#map { flex: 1; min-height: 0; }

/* POPUP CARTE */
.lp { font-family: sans-serif; min-width: 240px; max-width: 280px; }
.lp-etab { font-family: Georgia, serif; font-size: 1.05em; font-weight: bold; margin-bottom: 3px; color: var(--marron); }
.lp-ville { color: #888; font-size: 0.82em; margin-bottom: 8px; }
.lp-tag { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 0.75em; font-weight: bold; color: white; margin-bottom: 8px; }
.lp-grid { display: grid; grid-template-columns: auto 1fr; gap: 3px 8px; font-size: 0.83em; margin-bottom: 8px; }
.lp-lbl { color: #999; font-weight: bold; white-space: nowrap; }
.lp-val { color: var(--marron); }
.lp-projet { background: var(--beige); padding: 7px; border-radius: 5px; font-size: 0.82em; font-style: italic; color: #555; margin-bottom: 10px; border-left: 3px solid var(--verde); }
.lp-rgpd { font-size: 0.72em; color: #aaa; margin-bottom: 8px; font-style: italic; }
.btn-contact { width: 100%; padding: 9px; background: var(--verde); color: white; border: none; border-radius: 7px; cursor: pointer; font-size: 0.9em; font-weight: bold; font-family: sans-serif; transition: background 0.2s; }
.btn-contact:hover { background: var(--verde-dark); }

/* MODAL CONTACT */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.55); z-index: 9999; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 12px; padding: 28px; width: 90%; max-width: 460px; box-shadow: 0 10px 40px rgba(0,0,0,0.25); position: relative; max-height: 90vh; overflow-y: auto; }
.modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 1.4em; cursor: pointer; color: #aaa; }
.modal-close:hover { color: var(--marron); }
.modal h2 { font-size: 1.1em; margin-bottom: 4px; color: var(--marron); }
.modal-dest { font-size: 0.85em; color: var(--verde-dark); margin-bottom: 16px; font-family: sans-serif; font-weight: bold; }
.modal label { display: block; font-size: 0.85em; font-weight: bold; margin-bottom: 4px; font-family: sans-serif; color: var(--marron); }
.modal input, .modal textarea, .modal select { width: 100%; padding: 8px 10px; border: 1.5px solid #ddd; border-radius: 7px; font-size: 0.88em; font-family: sans-serif; margin-bottom: 12px; outline: none; background: var(--beige); color: var(--marron); }
.modal input:focus, .modal textarea:focus { border-color: var(--verde); }
.modal textarea { resize: vertical; min-height: 90px; }
.modal-rgpd { font-size: 0.75em; color: #888; font-family: sans-serif; margin-bottom: 14px; background: #f9f9f9; padding: 8px; border-radius: 5px; border-left: 3px solid #ddd; }
.modal-rgpd a { color: var(--verde); }
.modal-check { display: flex; align-items: flex-start; gap: 8px; font-size: 0.8em; font-family: sans-serif; color: #555; margin-bottom: 14px; }
.modal-check input { width: auto; margin: 0; }
.btn-send { width: 100%; padding: 11px; background: var(--verde); color: white; border: none; border-radius: 7px; cursor: pointer; font-size: 0.95em; font-weight: bold; font-family: sans-serif; transition: background 0.2s; }
.btn-send:hover { background: var(--verde-dark); }
.btn-send:disabled { background: #ccc; cursor: not-allowed; }
.modal-success { text-align: center; padding: 20px 0; }
.modal-success .icon { font-size: 2.5em; margin-bottom: 10px; }
.modal-success h3 { color: var(--verde-dark); margin-bottom: 8px; }
.modal-success p { font-size: 0.88em; font-family: sans-serif; color: #666; }
.modal-error { background: #fff0f0; color: #c0392b; padding: 8px 10px; border-radius: 6px; font-size: 0.83em; font-family: sans-serif; margin-bottom: 10px; display: none; }

/* LANG TOGGLE */
.lang-bar { background: var(--marron); display: flex; justify-content: flex-end; padding: 4px 20px; gap: 8px; }
.lang-btn { background: none; border: 1px solid #666; color: #aaa; padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 0.78em; font-family: sans-serif; }
.lang-btn.active { border-color: var(--verde); color: var(--verde); }
</style>
</head>
<body>

<!-- LANG BAR -->
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('fr')">🇫🇷 FR</button>
  <button class="lang-btn" onclick="setLang('es')">🇪🇸 ES</button>
</div>

<!-- HEADER -->
<div class="header">
  <h1>🗺️ <span>Intercambios</span> Escolares — La Casa del Profe</h1>
  <span class="badge" id="counter">⏳ Chargement...</span>
</div>

<!-- FILTRES -->
<div class="filters">
  <input type="text" id="search" placeholder="🔍 Ville, pays, établissement..."/>
  <select id="fType">
    <option value="">📌 Tous projets</option>
    <option value="correspondance">✉️ Correspondance</option>
    <option value="voyage">✈️ Voyage scolaire</option>
    <option value="erasmus">🎓 Erasmus+</option>
    <option value="autre">📝 Autre</option>
  </select>
  <select id="fPays"><option value="">🌍 Tous pays</option></select>
  <button class="btn-reset" onclick="resetF()">✕ Reset</button>
</div>

<!-- LÉGENDE -->
<div class="legend">
  <b>Légende :</b>
  <div class="leg"><div class="dot" style="background:#6F9C10"></div>Correspondance</div>
  <div class="leg"><div class="dot" style="background:#3a7bc8"></div>Voyage scolaire</div>
  <div class="leg"><div class="dot" style="background:#8b5cf6"></div>Erasmus+</div>
  <div class="leg"><div class="dot" style="background:#e05c3a"></div>Autre</div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-head" id="sb-head">📋 Toutes les annonces</div>
    <div id="sb-list"></div>
  </div>
  <div id="map"></div>
</div>

<!-- MODAL CONTACT -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="fermerModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============================================================
// LANGUE
// ============================================================
let LANG = 'fr';
const T = {
  fr: {
    contact_title: "Contacter cet établissement",
    contact_dest: "Votre message sera transmis à",
    nom: "Votre nom *", etab: "Votre établissement *",
    pays: "Votre pays *", email: "Votre email *",
    message: "Votre message *",
    message_ph: "Présentez votre projet, vos élèves, vos attentes...",
    rgpd: "Vos coordonnées seront transmises uniquement à l'établissement que vous contactez, conformément à notre politique de confidentialité. Elles ne seront jamais affichées publiquement.",
    check: "J'accepte que mon email soit transmis à l'établissement contacté pour faciliter la mise en relation.",
    send: "✉️ Envoyer le message",
    sending: "⏳ Envoi en cours...",
    success_title: "Message envoyé !",
    success_msg: "L'enseignant responsable va recevoir vos coordonnées et vous contactera directement. ¡ Buena suerte !",
    error: "Une erreur s'est produite. Veuillez réessayer.",
    rgpd_note: "🔒 Les emails ne sont jamais affichés publiquement — conformité RGPD.",
    btn_contact: "✉️ Contacter cet établissement",
    required: "Veuillez remplir tous les champs obligatoires et accepter les conditions.",
  },
  es: {
    contact_title: "Contactar este centro",
    contact_dest: "Su mensaje será transmitido a",
    nom: "Su nombre *", etab: "Su centro *",
    pays: "Su país *", email: "Su email *",
    message: "Su mensaje *",
    message_ph: "Presente su proyecto, sus alumnos, sus expectativas...",
    rgpd: "Sus datos serán transmitidos únicamente al centro que contacta, conforme a nuestra política de privacidad. Nunca se mostrarán públicamente.",
    check: "Acepto que mi email sea transmitido al centro contactado para facilitar el contacto.",
    send: "✉️ Enviar mensaje",
    sending: "⏳ Enviando...",
    success_title: "¡ Mensaje enviado !",
    success_msg: "El profesor responsable recibirá sus datos y le contactará directamente. ¡ Buena suerte !",
    error: "Se produjo un error. Por favor inténtelo de nuevo.",
    rgpd_note: "🔒 Los emails nunca se muestran públicamente — conformidad RGPD.",
    btn_contact: "✉️ Contactar este centro",
    required: "Por favor complete todos los campos obligatorios y acepte las condiciones.",
  }
};
function setLang(l) {
  LANG = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
}

// ============================================================
// DONNÉES — En production : remplacer par fetch() Apps Script
// ============================================================
const DATA = [
  { id:1, etab:"IES Les Vinyes", ville:"Rubí", pays:"Espagne", lat:41.493, lng:2.032, type:"correspondance", dest:"France", eleves:25, age:"14-15 ans", langue:"2 ans", projet:"Intercambio de correos y posible visita. Alumnos muy motivados por la cultura francesa." },
  { id:2, etab:"Collège Jean Moulin", ville:"Montpellier", pays:"France", lat:43.610, lng:3.876, type:"voyage", dest:"Espagne", eleves:28, age:"13-14 ans", langue:"3 ans", projet:"Voyage scolaire à Madrid avec hébergement en famille. Retour en France prévu en juin." },
  { id:3, etab:"IES Severo Ochoa", ville:"Alcobendas", pays:"Espagne", lat:40.547, lng:-3.640, type:"erasmus", dest:"France / Belgique", eleves:20, age:"16-17 ans", langue:"4 ans", projet:"Proyecto Erasmus+ KA2. Buscamos socios francófonos para movilidad de alumnos y profesores." },
  { id:4, etab:"Lycée Molière", ville:"Paris", pays:"France", lat:48.856, lng:2.352, type:"correspondance", dest:"Mexique / Colombie", eleves:30, age:"15-16 ans", langue:"5 ans", projet:"Correspondance avec Amérique Latine souhaitée. Projets culturels et linguistiques variés." },
  { id:5, etab:"Colegio San Ignacio", ville:"Bilbao", pays:"Espagne", lat:43.263, lng:-2.935, type:"voyage", dest:"France", eleves:22, age:"12-13 ans", langue:"1 an", projet:"Intercambio con colegio francés. Acogida en familias. Período previsto: Mayo-Junio." },
  { id:6, etab:"Collège Victor Hugo", ville:"Lyon", pays:"France", lat:45.748, lng:4.847, type:"erasmus", dest:"Espagne / Portugal", eleves:18, age:"14-15 ans", langue:"2 ans", projet:"Montage dossier Erasmus+ en cours. Recherche établissements ibériques motivés pour mobilité." },
  { id:7, etab:"IES Ramón y Cajal", ville:"Zaragoza", pays:"Espagne", lat:41.656, lng:-0.878, type:"correspondance", dest:"France / Belgique", eleves:24, age:"15-16 ans", langue:"3 ans", projet:"Intercambio epistolar y videoconferencias mensuales. Proyecto cultural hispano-francés." },
  { id:8, etab:"Colegio Nuevo Milenio", ville:"Buenos Aires", pays:"Argentine", lat:-34.603, lng:-58.381, type:"correspondance", dest:"France", eleves:35, age:"16-17 ans", langue:"2 ans", projet:"Intercambio cultural con Francia. Alumnos muy motivados por la cultura y lengua francesa." }
];

// ============================================================
// COULEURS / EMOJIS
// ============================================================
const COLORS = { correspondance:"#6F9C10", voyage:"#3a7bc8", erasmus:"#8b5cf6", autre:"#e05c3a" };
const EMOJIS = { correspondance:"✉️", voyage:"✈️", erasmus:"🎓", autre:"📝" };
const LABELS = { correspondance:"Correspondance", voyage:"Voyage scolaire", erasmus:"Erasmus+", autre:"Autre" };

// ============================================================
// CARTE LEAFLET
// ============================================================
const map = L.map('map').setView([44, 2], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CartoDB', subdomains:'abcd', maxZoom:19
}).addTo(map);

let markers = {}, activeId = null;

function icone(type) {
  const c = COLORS[type]||COLORS.autre, e = EMOJIS[type]||"📝";
  return L.divIcon({
    className:'',
    html:`<div style="width:32px;height:32px;background:${c};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 3px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:13px">${e}</span></div>`,
    iconSize:[32,32], iconAnchor:[16,32], popupAnchor:[0,-34]
  });
}

function popupHtml(a) {
  const c = COLORS[a.type]||COLORS.autre;
  const l = LABELS[a.type]||"Autre";
  const t = T[LANG];
  return `<div class="lp">
    <div class="lp-etab">${a.etab}</div>
    <div class="lp-ville">📍 ${a.ville}, ${a.pays}</div>
    <span class="lp-tag" style="background:${c}">${EMOJIS[a.type]} ${l}</span>
    <div class="lp-grid">
      <span class="lp-lbl">→</span><span class="lp-val">${a.dest}</span>
      <span class="lp-lbl">👥</span><span class="lp-val">${a.eleves} élèves · ${a.age}</span>
      <span class="lp-lbl">📚</span><span class="lp-val">${a.langue} de langue</span>
    </div>
    <div class="lp-projet">"${a.projet}"</div>
    <div class="lp-rgpd">🔒 ${t.rgpd_note}</div>
    <button class="btn-contact" onclick="ouvrirContact(${a.id})">${t.btn_contact}</button>
  </div>`;
}

// ============================================================
// AFFICHAGE
// ============================================================
function afficher(list) {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  document.getElementById('counter').textContent = `${list.length} annonce${list.length>1?'s':''} active${list.length>1?'s':''}`;
  document.getElementById('sb-head').textContent = `📋 ${list.length} annonce${list.length>1?'s':''}`;
  const sb = document.getElementById('sb-list');
  sb.innerHTML = '';
  if (!list.length) { sb.innerHTML='<div class="empty">😕 Aucune annonce ne correspond.</div>'; return; }
  list.forEach(a => {
    const m = L.marker([a.lat, a.lng], {icon: icone(a.type)}).addTo(map);
    m.bindPopup(popupHtml(a), {maxWidth:300});
    m.on('click', () => activer(a.id));
    markers[a.id] = m;
    const card = document.createElement('div');
    card.className = 'card'; card.id = 'c'+a.id;
    card.innerHTML = `<div class="card-etab">${a.etab}</div><div class="card-ville">📍 ${a.ville}, ${a.pays}</div><div><span class="tag" style="background:${COLORS[a.type]}">${EMOJIS[a.type]} ${LABELS[a.type]}</span> <span style="font-size:.74em;color:#999">→ ${a.dest}</span></div>`;
    card.onclick = () => activer(a.id);
    sb.appendChild(card);
  });
}

function activer(id) {
  if (activeId) { const o=document.getElementById('c'+activeId); if(o) o.classList.remove('active'); }
  activeId = id;
  const el = document.getElementById('c'+id);
  if (el) { el.classList.add('active'); el.scrollIntoView({behavior:'smooth', block:'nearest'}); }
  if (markers[id]) { map.setView(markers[id].getLatLng(), 8, {animate:true}); markers[id].openPopup(); }
}

// ============================================================
// FILTRES
// ============================================================
function filtrer() {
  const s = document.getElementById('search').value.toLowerCase();
  const t = document.getElementById('fType').value;
  const p = document.getElementById('fPays').value;
  afficher(DATA.filter(a =>
    (!s || [a.etab, a.ville, a.pays].some(x => x.toLowerCase().includes(s))) &&
    (!t || a.type === t) && (!p || a.pays === p)
  ));
}
function resetF() {
  document.getElementById('search').value='';
  document.getElementById('fType').value='';
  document.getElementById('fPays').value='';
  afficher(DATA);
}
document.getElementById('search').oninput = filtrer;
document.getElementById('fType').onchange = filtrer;
document.getElementById('fPays').onchange = filtrer;

// Peupler pays
const pays = [...new Set(DATA.map(a=>a.pays))].sort();
const sel = document.getElementById('fPays');
pays.forEach(p => { const o=document.createElement('option'); o.value=p; o.textContent=p; sel.appendChild(o); });

// ============================================================
// MODAL CONTACT
// ============================================================
let annonceActive = null;

function ouvrirContact(id) {
  annonceActive = DATA.find(a => a.id === id);
  if (!annonceActive) return;
  const t = T[LANG];
  document.getElementById('modal-body').innerHTML = `
    <h2>${t.contact_title}</h2>
    <div class="modal-dest">${t.contact_dest} : <strong>${annonceActive.etab}</strong> (${annonceActive.ville}, ${annonceActive.pays})</div>
    <div class="modal-error" id="modal-error">${t.error}</div>
    <label>${t.nom}<input type="text" id="c-nom" placeholder="Marie Dupont"/></label>
    <label>${t.etab}<input type="text" id="c-etab" placeholder="Collège Jean Jaurès"/></label>
    <label>${t.pays}<input type="text" id="c-pays" placeholder="France"/></label>
    <label>${t.email}<input type="email" id="c-email" placeholder="m.dupont@college.fr"/></label>
    <label>${t.message}<textarea id="c-msg" placeholder="${t.message_ph}"></textarea></label>
    <div class="modal-rgpd">${t.rgpd}</div>
    <div class="modal-check">
      <input type="checkbox" id="c-rgpd"/>
      <label for="c-rgpd">${t.check}</label>
    </div>
    <button class="btn-send" id="btn-send" onclick="envoyerContact()">${t.send}</button>`;
  document.getElementById('modal').classList.add('open');
}

function fermerModal() {
  document.getElementById('modal').classList.remove('open');
  annonceActive = null;
}

// Fermer en cliquant hors du modal
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) fermerModal();
});

async function envoyerContact() {
  const t = T[LANG];
  const nom   = document.getElementById('c-nom').value.trim();
  const etab  = document.getElementById('c-etab').value.trim();
  const pays  = document.getElementById('c-pays').value.trim();
  const email = document.getElementById('c-email').value.trim();
  const msg   = document.getElementById('c-msg').value.trim();
  const rgpd  = document.getElementById('c-rgpd').checked;
  const errEl = document.getElementById('modal-error');
  errEl.style.display = 'none';

  if (!nom || !etab || !pays || !email || !msg || !rgpd) {
    errEl.textContent = t.required;
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('btn-send');
  btn.disabled = true;
  btn.textContent = t.sending;

  // ============================================================
  // APPEL APPS SCRIPT — Remplace l'URL par celle de ta Web App
  // ============================================================
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz-IHPRq0_3Za_kgugFysREu_C2Bu4ga1C4qxTIVlQke3fSdvNA4CSj-hbcn7enrIsrjA/exec";

  try {
    const payload = {
      action: "contact",
      annonce_id: annonceActive.id,
      annonce_etab: annonceActive.etab,
      annonce_ville: annonceActive.ville,
      annonce_pays: annonceActive.pays,
      annonce_type: annonceActive.type,
      expediteur_nom: nom,
      expediteur_etab: etab,
      expediteur_pays: pays,
      expediteur_email: email,
      message: msg,
      langue: LANG
    };

    const resp = await fetch(WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const result = await resp.json();

    if (result.success) {
      document.getElementById('modal-body').innerHTML = `
        <div class="modal-success">
          <div class="icon">✅</div>
          <h3>${t.success_title}</h3>
          <p>${t.success_msg}</p>
        </div>`;
      setTimeout(fermerModal, 4000);
    } else {
      throw new Error(result.error || 'Erreur serveur');
    }
  } catch(err) {
    errEl.textContent = t.error + ' (' + err.message + ')';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = t.send;
  }
}

afficher(DATA);
</script>
